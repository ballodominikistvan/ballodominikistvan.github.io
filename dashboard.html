<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kvantum Kutatói Dashboard</title>
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/v4/css/metro-all.min.css">
    
    <style>
        body {
            background-color: #000000;
            background-image: 
                linear-gradient(135deg, rgba(255, 0, 255, 0.1) 0%, rgba(0, 0, 0, 1) 40%, rgba(0, 0, 0, 1) 60%, rgba(0, 255, 255, 0.1) 100%);
            background-size: cover;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .page-title {
            text-align: center;
            font-size: 4rem;
            color: #ffffff;
            text-shadow: 0 0 20px #00ffff, 0 0 30px #00ffff;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            margin-bottom: 40px;
        }

        .neon-tiles-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            max-width: 1400px;
        }

        .tile-link {
            text-decoration: none !important;
            transition: transform 0.2s ease-in-out;
        }

        .neon-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            border-radius: 12px;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
        }

        /* SVG Ikonok formázása */
        .neon-tile svg {
            fill: currentColor; /* Az ikon színe megegyezik a szöveg színével */
            margin-bottom: 10px;
            transition: all 0.3s ease-in-out;
        }

        .neon-tile .tile-label {
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            text-align: center;
        }

        /* --- KIJELÖLT (LILA, NAGY) --- */
        .tile-link.active .neon-tile {
            width: 260px;
            height: 360px;
            border-color: #ff00ff;
            box-shadow: 0 0 15px #ff00ff, inset 0 0 15px #ff00ff;
            color: #ff00ff;
        }
        
        /* Nagyobb SVG ikon az aktív csempének */
        .tile-link.active .neon-tile svg { 
            width: 100px; 
            height: 100px; 
        } 
        
        .tile-link.active .tile-label { font-size: 1.5rem; font-weight: bold; }

        /* --- NEM KIJELÖLT (KÉK, KICSI) --- */
        .tile-link.inactive .neon-tile {
            width: 180px;
            height: 250px;
            border-color: #00ffff;
            box-shadow: 0 0 8px #00ffff, inset 0 0 8px #00ffff;
            color: #00ffff;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .tile-link.inactive:hover .neon-tile {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00ffff, inset 0 0 10px #00ffff;
        }

        /* Kisebb SVG ikon a nem aktív csempéknek */
        .tile-link.inactive .neon-tile svg { 
            width: 60px; 
            height: 60px; 
        }

        .tile-link.inactive .tile-label { font-size: 1rem; }

        .site-footer-orcid {
        width: 100%;
        text-align: center;
        padding: 20px 0;
        border-top: 1px solid #eee; /* Finom elválasztó vonal */
        margin-top: 40px;
    }

    .orcid-link {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        color: #555;
        transition: color 0.2s ease-in-out;
        font-size: 14px;
    }

    .orcid-link:hover {
        color: #A6CE39;
    }

    .orcid-logo {
        width: 18px;
        height: 18px;
        margin-right: 8px;
        vertical-align: middle;
    }

    .orcid-id-text {
        letter-spacing: 0.5px;
    }

    </style>
</head>
<body>

    <h1 class="page-title">KVANTUM</h1>

    <div class="neon-tiles-container">
        
        <a href="index.html" class="tile-link active">
