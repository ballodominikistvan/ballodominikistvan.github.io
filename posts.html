<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/metro.css">
    <script src="https://cdn.metroui.org.ua/current/metro.js"></script>

    <style>
        .nav-container {
            padding: 20px;
            display: flex;
            justify-content: flex-start;
        }

        /* Képes csempe stílusa */
        .tile-content-nav {
            background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=800&auto=format&fit=crop'); /* Technikai/Rács háttér */
            background-size: cover;
            background-position: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Sötétítő réteg a szöveg olvashatóságáért */
        .tile-content-nav::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* 50%-os sötétítés */
        }

        /* A felirat a sötétítés felett legyen */
        .nav-tile .badge-bottom {
            z-index: 2;
        }
    </style>
</head>
<body class="bg-darkTeal fg-white">

    <div class="nav-container">
        <a href="dashboard.html" 
           data-role="tile" 
           data-size="wide" 
           class="nav-tile">
            <div class="tile-content-nav"></div>
            <span class="badge-bottom fg-white">Vissza a Dashboardra</span>
        </a>
    </div>

    <hr class="thin bg-grayBlue">

    </body>
</html>
